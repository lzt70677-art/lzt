          <b>&#31481;</b>
        </button>
        <button class="scene11-card" type="button" data-flower="chrysanthemum" aria-label="chrysanthemum">
          <span class="scene11-card-bg"></span>
          <img class="scene11-card-frame" src="assets/svg/scene11/card-chrysanthemum.svg" alt="">
          <img class="scene11-card-branch" src="assets/png/scene11/flower-chrysanthemum.png" alt="">
          <b>&#33738;</b>
        </button>
        <button class="scene11-card" type="button" data-flower="lotus" aria-label="lotus">
          <span class="scene11-card-bg"></span>
          <img class="scene11-card-frame" src="assets/svg/scene11/card-lotus.svg" alt="">
          <img class="scene11-card-branch" src="assets/png/scene11/flower-lotus.png" alt="">
          <b>&#33655;</b>
        </button>
      </div>

      <button class="scene11-result-button scene11-layer" type="button" disabled aria-label="view flower arrangement">
        <img class="scene11-result-art" src="assets/png/scene11/view-bottle-button.png" alt="">
      </button>
    </section>

    <section class="scene scene-12" id="scene-12" aria-label="flower arrangement result">
      <img class="scene12-bg" src="assets/png/scene12/background-no-stamp.png" alt="">
      <div class="scene12-stamp-crop scene12-layer" aria-hidden="true">
        <img src="assets/svg/scene12/flower-stamp.svg" alt="">
      </div>
      <button class="scene12-back scene12-layer" type="button" aria-label="back to ritual selection">
        <img src="assets/svg/scene12/back-button.svg" alt="">
      </button>
    </section>

    <section class="scene scene-13" id="scene-13" aria-label="painting intro">
      <img class="scene13-bg" src="assets/png/scene13/background.png" alt="">
      <img class="scene13-title scene13-layer" src="assets/svg/scene13/title.svg" alt="">
      <img class="scene13-seal scene13-layer" src="assets/svg/scene13/seal.svg" alt="">
      <img class="scene13-copy scene13-layer" src="assets/svg/scene13/copy.svg" alt="">
      <img class="scene13-scroll scene13-layer" src="assets/svg/scene13/scroll.svg" alt="">
      <button class="scene13-start scene13-layer" type="button" aria-label="start painting">
        <img src="assets/svg/scene13/start-button.svg" alt="">
      </button>
    </section>

    <section class="scene scene-14" id="scene-14" aria-label="painting scroll interaction">
      <img class="scene14-bg" src="assets/png/scene14/background.png" alt="">
      <div class="scene14-title scene14-layer" aria-label="向下滑动，轻展画轴">&#21521;&#19979;&#28369;&#21160;&#65292;&#36731;&#23637;&#30011;&#36724;</div>
      <img class="scene14-divider scene14-layer" src="assets/png/scene14/painting-divider.png" alt="">

      <div class="scene14-scroll-stage scene14-layer" aria-label="drag down to unfurl the scroll">
        <div class="scene14-scroll-viewport" aria-hidden="true">
          <div class="scene14-scroll-content">
            <img class="scene14-scroll-art" src="assets/svg/scene14/blank-scroll.svg" alt="">
            <div class="scene14-painting-window">
              <img class="scene14-painting-art" src="assets/png/scene14/painting-ink.png" alt="">
            </div>
          </div>
        </div>
        <button class="scene14-drag-zone" type="button" aria-label="drag down to unfold painting scroll"></button>
      </div>

      <div class="scene14-gesture scene14-layer" aria-hidden="true">
        <span class="scene14-gesture-dots"></span>
        <img class="scene14-gesture-hand" src="assets/png/scene14/gesture-hand.png" alt="">
        <span class="scene14-gesture-arrow"></span>
      </div>

      <div class="scene14-progress-text scene14-layer" aria-live="polite">
        <span>&#23637;&#24320;&#36827;&#24230;&#65306;</span><strong>0%</strong>
      </div>
      <div class="scene14-progress scene14-layer" aria-hidden="true">
        <div class="scene14-progress-fill"></div>
      </div>

      <button class="scene14-start scene14-layer" type="button" disabled aria-label="enter painting search">
        <img src="assets/svg/scene14/enter-painting.svg" alt="">
      </button>
    </section>

    <section class="scene scene-15" id="scene-15" aria-label="painting search game">
      <img class="scene15-bg" src="assets/png/scene15/background.png" alt="">
      <img class="scene15-title scene15-layer" src="assets/svg/scene15/title.svg" alt="">
      <img class="scene15-divider scene15-layer" src="assets/png/scene15/painting-divider.png" alt="">

      <div class="scene15-scroll scene15-layer" aria-label="painting with hidden scenery">
        <img class="scene15-scroll-art" src="assets/png/scene15/scroll-painting.png" alt="">
        <button class="scene15-hotspot scene15-hotspot-mountain" type="button" data-target="mountain" aria-label="find distant mountain">
          <span class="scene15-target-ring"></span>
          <span class="scene15-target-check"></span>
        </button>
        <button class="scene15-hotspot scene15-hotspot-boat" type="button" data-target="boat" aria-label="find boat">
          <span class="scene15-target-ring"></span>
          <span class="scene15-target-check"></span>
        </button>
        <button class="scene15-hotspot scene15-hotspot-pavilion" type="button" data-target="pavilion" aria-label="find pavilion">
          <span class="scene15-target-ring"></span>
          <span class="scene15-target-check"></span>
        </button>
      </div>

      <div class="scene15-task-list scene15-layer" aria-label="painting search targets">
        <button class="scene15-task" type="button" data-target="mountain" aria-label="distant mountain">
          <span>&#36828;<br>&#23665;</span><i></i>
        </button>
        <button class="scene15-task" type="button" data-target="boat" aria-label="boat">
          <span>&#23567;<br>&#33311;</span><i></i>
        </button>
        <button class="scene15-task" type="button" data-target="pavilion" aria-label="pavilion">
          <span>&#20141;<br>&#21488;</span><i></i>
        </button>
      </div>

      <div class="scene15-found scene15-layer" aria-live="polite">
        <span class="scene15-found-line"></span>
        <span class="scene15-found-label">&#24050;&#25214;&#21040;&#65306;</span>
        <span class="scene15-found-count"><b>0</b> / 3</span>
        <span class="scene15-found-line"></span>
      </div>

      <div class="scene15-progress scene15-layer" aria-hidden="true">
        <img src="assets/svg/scene15/progress-panel.svg" alt="">
        <span data-index="0"></span>
        <span data-index="1"></span>
        <span data-index="2"></span>
      </div>

      <button class="scene15-collect scene15-layer" type="button" disabled aria-label="collect painting meaning">
        <img class="scene15-collect-disabled" src="assets/svg/scene15/collect-button-disabled.svg" alt="">
        <img class="scene15-collect-ready" src="assets/svg/scene15/collect-button-ready.svg" alt="">
      </button>
    </section>

    <section class="scene scene-16" id="scene-16" aria-label="tea art sharing result">
      <img class="scene16-bg" src="assets/png/scene16/background-tea-finish.png" alt="">
      <img class="scene16-title-image scene16-layer" src="assets/png/scene16/title-tea-finish.png" alt="茶，清欢初成">
      <img class="scene16-subtitle-image scene16-layer" src="assets/png/scene16/subtitle-text.png" alt="盖茶汤，绘就千年风雅。">
      <img class="scene16-seal scene16-layer" src="assets/png/scene16/seal-tea-art.png" alt="">

      <div class="scene16-bowl-stage scene16-layer" aria-label="your tea art result">
        <img class="scene16-bowl" src="assets/png/scene16/tea-bowl-with-foam.png" alt="">
        <img class="scene16-art-overlay" alt="">
        <div class="scene16-bowl-shine" aria-hidden="true"></div>
      </div>

      <img class="scene16-still-life scene16-layer" src="assets/png/scene16/tea-finish-still-life.png" alt="">
      <div class="scene16-share-note scene16-layer">这是你亲手绘出的茶百戏图案</div>
      <button class="scene16-next scene16-layer" type="button">
        <img src="assets/png/scene16/button-next.png" alt="">
        <span>获取茶印</span>
      </button>
    </section>

    <section class="scene scene-17" id="scene-17" aria-label="tea seal reward">
      <img class="scene17-bg" src="assets/png/scene17/background.png" alt="">
      <img class="scene17-title scene17-layer" src="assets/png/scene17/title-tea-done.png" alt="茶已成花">
      <img class="scene17-seal scene17-layer" src="assets/png/scene17/seal-vertical.png" alt="">
      <img class="scene17-divider scene17-layer" src="assets/png/scene17/divider.png" alt="">
      <img class="scene17-copy scene17-layer" src="assets/png/scene17/copy-text.png" alt="你的汤花细密如雪，已得“雪乳”之境。宋人点茶，重在击拂，也重在由动入静。">
      <img class="scene17-tea-stamp scene17-layer" src="assets/png/scene17/tea-stamp.png" alt="茶印">
      <img class="scene17-gain-text scene17-layer" src="assets/png/scene17/gain-text.png" alt="获得「茶」印">
      <button class="scene17-back scene17-layer" type="button">
        <img src="assets/png/scene17/button-return.png" alt="">
        <span>返回四雅空间</span>
      </button>
    </section>

    <section class="scene scene-18" id="scene-18" aria-label="painting seal reward">
      <img class="scene18-bg" src="assets/jpg/scene18/background.jpg" alt="">
      <img class="scene18-title scene18-layer" src="assets/png/scene18/title.png" alt="画已成境">
      <img class="scene18-divider scene18-layer" src="assets/png/scene18/painting-divider.png" alt="">
      <div class="scene18-subtitle scene18-layer">一卷山水，万象入心</div>
      <img class="scene18-scroll scene18-layer" src="assets/png/scene18/painting-scroll.png" alt="山水画卷">
      <img class="scene18-poem scene18-layer" src="assets/png/scene18/poem.png" alt="笔墨未语，而山水已自成气象。宋人赏画，重在可游可居，一卷之间，便得一方清远。">
      <img class="scene18-painting-stamp scene18-layer" src="assets/svg/scene18/painting-stamp.svg" alt="画印">
      <img class="scene18-gain-text scene18-layer" src="assets/png/scene18/gain-text.png" alt="获得「画」印">
      <button class="scene18-back scene18-layer" type="button">
        <img src="assets/svg/scene18/return-button.svg" alt="">
        <span>返回四雅空间</span>
      </button>
    </section>

    <section class="scene scene-19" id="scene-19" aria-label="qinghuan sign result">
      <img class="scene19-result" src="assets/scene19/qinghuan-0.jpg" alt="">
      <button class="scene19-action scene19-retry" type="button" aria-label="try again">
        <img src="assets/scene19/retry-qinghuan.png" alt="">
      </button>
      <button class="scene19-action scene19-save" type="button" aria-label="save qinghuan sign">
        <img src="assets/scene19/save-qinghuan.png" alt="">
      </button>
    </section>
  </main>

  <script src="assets/vendor/gsap.min.js"></script>
  <script src="script.js?v=audio-unlock-fix-2"></script>
</body>
</html>
